services:
  mookbars-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app/src
    volumes:
      - .:/app
    environment:
      - TITLE=My Site in docker !
      - HEADING=Welcome
      - ENV_NAME=development
      - VERSION=1.0.0
    command: >
      deno task run

