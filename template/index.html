{% extends "_base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<main class="links-page">
    {% for group in groups %}
    <section class="group">
        <h2 class="group__title">{{ group.title }}</h2>
        <div class="group__links">
            {% for link in group.links %}
            <a class="link" href="{{ link.url }}" target="_blank" rel="noopener noreferrer">{{ link.label }}</a>
            {% endfor %}
        </div>
    </section>
    {% endfor %}
</main>
{% endblock %}
