{% extends "_base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
{% if not noHeader %}<h1>{{ title }}</h1>{% endif %}
{% for group in groups %}
<section>
    <h2>{{ group.title }}</h2>
    <ul>
        {% for link in group.links %}
        <li><a href="{{ link.url }}">{{ link.label }}</a></li>
        {% endfor %}
    </ul>
</section>
{% endfor %}
{% endblock %}
