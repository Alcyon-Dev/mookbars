{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ title }}</h1>
{% for group in groups %}
<section>
    <h2>{{ group.title }}</h2>
    <ul>
    {% for link in group.links %}
        <li><a href="{{ link.url }}">{{ link.label }}</a></li>
    {% endfor %}
    </ul>
</section>
{% endfor %}
{% endblock %}
