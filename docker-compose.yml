services:
  deno-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: deno-dev
    working_dir: /app/src
    volumes:
      - .:/app
    environment:
      - MB_VERSION=${MB_VERSION}
    restart: unless-stopped

  assets-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: assets-dev
    working_dir: /app/assets/scripts
    volumes:
      - .:/app
    restart: unless-stopped

  server-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: server-dev
    working_dir: /app
    volumes:
      - ./public:/srv
      - ./server:/etc/caddy
    ports:
      - "8007:8007"
    restart: unless-stopped
